<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KnowledgeBase AI</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: system-ui, sans-serif;
      }
      body {
        background: #f0f2f5;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* Sidebar */
      .sidebar {
        width: 260px;
        background: #1e1e2e;
        color: #cdd6f4;
        display: flex;
        flex-direction: column;
        padding: 16px;
        flex-shrink: 0;
      }
      .sidebar h2 {
        font-size: 15px;
        font-weight: 600;
        color: #cba6f7;
        margin-bottom: 16px;
      }
      .new-chat-btn {
        background: #313244;
        border: 1px solid #45475a;
        color: #cdd6f4;
        padding: 10px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        width: 100%;
        text-align: left;
        margin-bottom: 12px;
      }
      .new-chat-btn:hover {
        background: #45475a;
      }
      .session-list {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .session-item {
        padding: 9px 12px;
        border-radius: 7px;
        cursor: pointer;
        font-size: 12px;
        color: #bac2de;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .session-item:hover {
        background: #313244;
      }
      .session-item.active {
        background: #45475a;
        color: #cdd6f4;
      }
      .login-area {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #313244;
      }
      .login-area input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #45475a;
        background: #313244;
        color: #cdd6f4;
        font-size: 12px;
        margin-bottom: 6px;
      }
      .login-area input::placeholder {
        color: #585b70;
      }
      .login-area button {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        background: #cba6f7;
        color: #1e1e2e;
        border: none;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
      }

      /* Main chat area */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .chat-header {
        background: #fff;
        padding: 14px 20px;
        border-bottom: 1px solid #e5e7eb;
        font-size: 15px;
        font-weight: 600;
        color: #111;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        display: inline-block;
        margin-right: 6px;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .msg-wrap {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        max-width: 800px;
      }
      .msg-wrap.user {
        flex-direction: row-reverse;
        margin-left: auto;
      }
      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
        flex-shrink: 0;
      }
      .avatar.ai {
        background: #ede9fe;
        color: #7c3aed;
      }
      .avatar.user {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .bubble {
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.65;
        max-width: 640px;
      }
      .bubble.ai {
        background: #fff;
        border: 1px solid #e5e7eb;
        color: #111;
        border-radius: 4px 12px 12px 12px;
      }
      .bubble.user {
        background: #7c3aed;
        color: #fff;
        border-radius: 12px 4px 12px 12px;
      }
      .bubble.typing::after {
        content: "▋";
        animation: blink 0.6s infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      .sources {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #f0f0f0;
      }
      .sources-label {
        font-size: 11px;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 5px;
      }
      .source-chip {
        display: inline-block;
        font-size: 11px;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        padding: 2px 8px;
        border-radius: 99px;
        margin: 2px;
        color: #555;
      }
      .empty-state {
        text-align: center;
        margin: auto;
        color: #888;
      }
      .empty-state h3 {
        font-size: 18px;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
      }
      .empty-state p {
        font-size: 14px;
      }

      /* Input area */
      .input-area {
        background: #fff;
        padding: 16px 20px;
        border-top: 1px solid #e5e7eb;
        display: flex;
        gap: 10px;
      }
      .input-area textarea {
        flex: 1;
        padding: 11px 14px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 14px;
        outline: none;
        resize: none;
        height: 44px;
        max-height: 120px;
        font-family: inherit;
      }
      .input-area textarea:focus {
        border-color: #7c3aed;
      }
      .send-btn {
        padding: 10px 20px;
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        min-width: 80px;
      }
      .send-btn:disabled {
        background: #c4b5fd;
        cursor: not-allowed;
      }
      .error-msg {
        color: #ef4444;
        font-size: 12px;
        padding: 4px 0;
      }
    </style>
  </head>
  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>🧠 KnowledgeBase AI</h2>
      <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
      <div class="session-list" id="sessionList"></div>

      <div class="login-area" id="loginArea">
        <input
          type="email"
          id="emailInput"
          placeholder="Email"
          value="admin@test.com"
        />
        <input
          type="password"
          id="passwordInput"
          placeholder="Password"
          style="margin-top: 6px"
          value="Test1234"
        />
        <button onclick="login()">Login</button>
        <div class="error-msg" id="loginError"></div>
      </div>
    </div>

    <!-- MAIN CHAT -->
    <div class="main">
      <div class="chat-header">
        <span id="sessionTitle">KnowledgeBase AI</span>
        <span
          ><span class="status-dot" id="statusDot"></span
          ><span id="statusText" style="font-size: 12px; color: #888"
            >Not logged in</span
          ></span
        >
      </div>
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <h3>Welcome to KnowledgeBase AI</h3>
          <p>
            Login and start a new chat to ask questions about your documents.
          </p>
        </div>
      </div>
      <div class="input-area">
        <textarea
          id="questionInput"
          placeholder="Ask a question about your documents..."
          onkeydown="handleKey(event)"
          disabled
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          Send
        </button>
      </div>
    </div>

    <script>
      // ── State ─────────────────────────────────────────────────────────
      let token = localStorage.getItem("kb_token") || null;
      let sessionId = localStorage.getItem("kb_session") || null;
      let isStreaming = false;

      // ── Init ──────────────────────────────────────────────────────────
      window.onload = async () => {
        if (token) {
          setLoggedIn();
          await loadSessions();
          if (sessionId) await loadHistory();
        }
      };

      // ── Auth ──────────────────────────────────────────────────────────
      async function login() {
        const email = document.getElementById("emailInput").value;
        const password = document.getElementById("passwordInput").value;
        document.getElementById("loginError").textContent = "";

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Login failed");

          token = data.token;
          localStorage.setItem("kb_token", token);
          setLoggedIn();
          await loadSessions();

          // Auto-create a new session if user doesn't have one
          if (!sessionId) {
            await newChat();
          }
        } catch (err) {
          document.getElementById("loginError").textContent = err.message;
        }
      }

      function setLoggedIn() {
        document.getElementById("statusDot").style.background = "#22c55e";
        document.getElementById("statusText").textContent = "Connected";
        document.getElementById("questionInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("loginArea").style.display = "none";
      }

      // ── Sessions ──────────────────────────────────────────────────────
      async function loadSessions() {
        try {
          const res = await apiFetch("/api/chat/sessions");
          const data = await res.json();
          renderSessions(data.sessions || []);
        } catch (err) {
          console.error("Load sessions failed", err);
        }
      }

      function renderSessions(sessions) {
        const list = document.getElementById("sessionList");
        list.innerHTML = sessions
          .map(
            (s) => `
      <div class="session-item ${s.sessionId === sessionId ? "active" : ""}"
           onclick="switchSession('${s.sessionId}', '${escHtml(s.title)}')">
        ${escHtml(s.title || "New conversation")}
      </div>
    `,
          )
          .join("");
      }

      async function newChat() {
        try {
          const res = await apiFetch("/api/chat/session", {
            method: "POST",
            body: JSON.stringify({}),
          });
          const data = await res.json();
          sessionId = data.session.sessionId;
          localStorage.setItem("kb_session", sessionId);
          document.getElementById("messages").innerHTML = "";
          document.getElementById("emptyState") &&
            document.getElementById("emptyState").remove();
          document.getElementById("sessionTitle").textContent =
            "New conversation";
          await loadSessions();
        } catch (err) {
          console.error("New chat failed", err);
        }
      }

      async function switchSession(id, title) {
        sessionId = id;
        localStorage.setItem("kb_session", sessionId);
        document.getElementById("sessionTitle").textContent = title;
        document.getElementById("messages").innerHTML = "";
        await loadHistory();
        await loadSessions();
      }

      async function loadHistory() {
        if (!sessionId) return;
        try {
          const res = await apiFetch(`/api/chat/${sessionId}`);
          const data = await res.json();
          document.getElementById("messages").innerHTML = "";
          (data.messages || []).forEach((m) => {
            if (m.role === "user") addUserBubble(m.content);
            else addAIBubble(m.content, m.sources || []);
          });
          document.getElementById("sessionTitle").textContent =
            data.session.title || "Chat";
        } catch (err) {
          console.error("Load history failed", err);
        }
      }

      // ── Chat ──────────────────────────────────────────────────────────
      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      async function sendMessage() {
        if (isStreaming || !token || !sessionId) return;
        const input = document.getElementById("questionInput");
        const q = input.value.trim();
        if (!q) return;

        input.value = "";
        isStreaming = true;
        document.getElementById("sendBtn").disabled = true;

        // Show user bubble
        addUserBubble(q);

        // Create empty AI bubble with typing indicator
        const aiDiv = addTypingBubble();

        // Use SSE streaming
        const url = `/api/chat/stream?sessionId=${encodeURIComponent(sessionId)}&question=${encodeURIComponent(q)}`;
        const es = new EventSource(url);
        let fullAnswer = "";
        let sources = [];

        es.onmessage = (e) => {
          if (e.data === "[DONE]") {
            aiDiv.classList.remove("typing");
            renderSources(aiDiv, sources);
            es.close();
            isStreaming = false;
            document.getElementById("sendBtn").disabled = false;
            loadSessions();
            return;
          }
          const parsed = JSON.parse(e.data);
          if (parsed.error) {
            aiDiv.textContent = "⚠️ Error: " + parsed.error;
            aiDiv.classList.remove("typing");
            es.close();
            isStreaming = false;
            document.getElementById("sendBtn").disabled = false;
            return;
          }
          if (parsed.sources) {
            sources = parsed.sources;
            return;
          }
          if (parsed.chunk) {
            fullAnswer += parsed.chunk;
            aiDiv.classList.remove("typing");
            aiDiv.textContent = fullAnswer;
            scrollToBottom();
          }
        };

        es.onerror = () => {
          if (isStreaming) {
            aiDiv.textContent =
              fullAnswer || "⚠️ Connection error. Please try again.";
            aiDiv.classList.remove("typing");
            es.close();
            isStreaming = false;
            document.getElementById("sendBtn").disabled = false;
          }
        };
      }

      // ── Render helpers ────────────────────────────────────────────────
      function addUserBubble(text) {
        const msgs = document.getElementById("messages");
        msgs.innerHTML += `
      <div class="msg-wrap user">
        <div class="avatar user">U</div>
        <div class="bubble user">${escHtml(text)}</div>
      </div>`;
        scrollToBottom();
      }

      function addAIBubble(text, sources) {
        const msgs = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "msg-wrap";
        div.innerHTML = `<div class="avatar ai">AI</div><div class="bubble ai">${escHtml(text)}</div>`;
        msgs.appendChild(div);
        renderSources(div.querySelector(".bubble"), sources);
        scrollToBottom();
        return div.querySelector(".bubble");
      }

      function addTypingBubble() {
        const msgs = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "msg-wrap";
        div.innerHTML = `<div class="avatar ai">AI</div><div class="bubble ai typing"></div>`;
        msgs.appendChild(div);
        scrollToBottom();
        return div.querySelector(".bubble");
      }

      function renderSources(bubble, sources) {
        if (!sources || sources.length === 0) return;
        const existing = bubble.querySelector(".sources");
        if (existing) existing.remove();
        const srcDiv = document.createElement("div");
        srcDiv.className = "sources";
        srcDiv.innerHTML =
          `<div class="sources-label">Sources</div>` +
          sources
            .map(
              (s) =>
                `<span class="source-chip">📄 ${escHtml(s.docTitle)} — Page ${s.pageNumber} (${(s.similarity * 100).toFixed(0)}% match)</span>`,
            )
            .join("");
        bubble.appendChild(srcDiv);
      }

      function scrollToBottom() {
        const msgs = document.getElementById("messages");
        msgs.scrollTop = msgs.scrollHeight;
      }

      function escHtml(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ── API helper ────────────────────────────────────────────────────
      function apiFetch(url, opts = {}) {
        return fetch(url, {
          ...opts,
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
            ...(opts.headers || {}),
          },
        });
      }
    </script>
  </body>
</html>
